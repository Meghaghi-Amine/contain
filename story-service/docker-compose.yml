services:
  
  api-story:
    build: .
    container_name: api-story
    ports:
      - "5001:5001" 
    environment:
      - PORT=5001
      - DB_HOST=db-story
      - DB_USER=admin
      - DB_PASSWORD=secret
      - DB_NAME=workshop
      - DB_PORT=5432
      - OPENAI_API_KEY=${OPENAI_API_KEY} 
    depends_on:
      db-story:
        condition: service_healthy 
    networks:
      - story-network

 
  db-story:
    image: postgres:14-alpine 
    container_name: db-story
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=workshop
      - PGDATA=/var/lib/postgresql/data/pgdata 
    volumes:
      - story-db-data:/var/lib/postgresql/data 
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro 
    networks:
      - story-network
    healthcheck: 
      test: ["CMD-SHELL", "pg_isready -U admin -d workshop"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  story-network: 
    driver: bridge

volumes:
  story-db-data: 