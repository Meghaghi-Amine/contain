name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Stage 1: Security Scan
  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone --depth 1 "https://oauth2:${TOKEN}@${GITHUB_SERVER_URL#https://}/${GITHUB_REPOSITORY}.git" .
          git checkout ${{ github.sha }}

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.50.4

      - name: Scan frontend for vulnerabilities
        run: trivy fs --severity MEDIUM,HIGH,CRITICAL --exit-code 1 ./frontend

      - name: Scan story-service for vulnerabilities
        run: trivy fs --severity MEDIUM,HIGH,CRITICAL --exit-code 1 ./story-service

  # Stage 2 & 3: Build and Push images
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone --depth 1 "https://oauth2:${TOKEN}@${GITHUB_SERVER_URL#https://}/${GITHUB_REPOSITORY}.git" .

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build and push frontend image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/storybuddy-frontend:latest ./frontend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/storybuddy-frontend:latest

      - name: Build and push story-service image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/storybuddy-story-service:latest ./story-service
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/storybuddy-story-service:latest
