name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Stage 1: Security Scan
  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan for vulnerabilities
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE:/src" aquasec/trivy:0.50.0 config \
            --severity MEDIUM,HIGH,CRITICAL \
            --exit-code 1 \
            /src

  # Stage 2 & 3: Build and Push images
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: hyperzyj/storybuddy-frontend:latest

      - name: Build and push story-service image
        uses: docker/build-push-action@v5
        with:
          context: ./story-service
          push: true
          tags: hyperzyj/storybuddy-story-service:latest
