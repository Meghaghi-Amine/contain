name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Stage 1: Security Scan
  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          git clone --depth 1 --branch "${BRANCH}" "https://oauth2:${TOKEN}@${GITHUB_SERVER_URL#https://}/${GITHUB_REPOSITORY}.git" .

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq
          sudo apt-get install -y trivy

      - name: Scan frontend for vulnerabilities
        run: trivy fs --severity MEDIUM,HIGH,CRITICAL --exit-code 1 ./frontend

      - name: Scan story-service for vulnerabilities
        run: trivy fs --severity MEDIUM,HIGH,CRITICAL --exit-code 1 ./story-service

  # Stage 2 & 3: Build and Push images
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          git clone --depth 1 --branch "${BRANCH}" "https://oauth2:${TOKEN}@${GITHUB_SERVER_URL#https://}/${GITHUB_REPOSITORY}.git" .

      - name: Login to Docker Hub
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: echo "${DOCKERHUB_TOKEN}" | docker login -u "hyperzyj" --password-stdin

      - name: Build and push frontend image
        run: |
          docker build -t "hyperzyj/storybuddy-frontend:latest" ./frontend
          docker push "hyperzyj/storybuddy-frontend:latest"

      - name: Build and push story-service image
        run: |
          docker build -t "hyperzyj/storybuddy-story-service:latest" ./story-service
          docker push "hyperzyj/storybuddy-story-service:latest"
